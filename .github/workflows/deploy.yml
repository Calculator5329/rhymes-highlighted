name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npx firebase-tools deploy --only hosting:rhymes-highlighted --project master-site-92392 --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
